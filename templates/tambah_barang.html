<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Barang - Sistem Inventaris</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script>
        function toggleJenisBarang() {
            const jenis = document.getElementById('jenis').value;
            document.getElementById('perishable_fields').style.display = jenis === 'perishable' ? 'block' : 'none';
            document.getElementById('fragile_fields').style.display = jenis === 'fragile' ? 'block' : 'none';
        }
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-box-seam"></i> Gudang PT. Remaja Cuan Indonesia
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/barang">Daftar Barang</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/barang/tambah">Tambah Barang</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2><i class="bi bi-plus-circle"></i> Tambah Barang</h2>
        <hr>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'error' else 'danger' }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <i class="bi bi-box"></i> Form Tambah Barang
                    </div>
                    <div class="card-body">
                        <form method="POST" action="/barang/tambah">
                            <div class="mb-3">
                                <label for="nama" class="form-label">Nama Barang *</label>
                                <input type="text" class="form-control" id="nama" name="nama" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="kategori" class="form-label">Kategori *</label>
                                <input type="text" class="form-control" id="kategori" name="kategori" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="jenis" class="form-label">Jenis Barang *</label>
                                <select class="form-select" id="jenis" name="jenis" onchange="toggleJenisBarang()" required>
                                    <option value="biasa">Biasa</option>
                                    <option value="perishable">Perishable (Butuh Pendingin)</option>
                                    <option value="fragile">Fragile (Pecah Belah)</option>
                                </select>
                            </div>
                            
                            <div id="perishable_fields" style="display: none;">
                                <div class="mb-3">
                                    <label for="tanggal_kadaluarsa" class="form-label">Tanggal Kadaluarsa *</label>
                                    <input type="date" class="form-control" id="tanggal_kadaluarsa" name="tanggal_kadaluarsa">
                                </div>
                            </div>
                            
                            <div id="fragile_fields" style="display: none;">
                                <div class="mb-3">
                                    <label for="instruksi_proteksi" class="form-label">Instruksi Proteksi *</label>
                                    <textarea class="form-control" id="instruksi_proteksi" name="instruksi_proteksi" rows="2"></textarea>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="stok" class="form-label">Stok *</label>
                                        <input type="number" class="form-control" id="stok" name="stok" min="0" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="min_stok" class="form-label">Minimal Stok</label>
                                        <input type="number" class="form-control" id="min_stok" name="min_stok" value="10" min="0">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="harga" class="form-label">Harga (Rp) *</label>
                                        <input type="number" class="form-control" id="harga" name="harga" step="0.01" min="0" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3">
                                        <label for="berat" class="form-label">Berat (kg) *</label>
                                        <input type="number" class="form-control" id="berat" name="berat" step="0.1" min="0" required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="lokasi_rak" class="form-label">Lokasi Rak</label>
                                <input type="text" class="form-control" id="lokasi_rak" name="lokasi_rak" placeholder="Contoh: Rak A-01">
                            </div>
                            
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/barang" class="btn btn-secondary me-md-2">Batal</a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save"></i> Simpan Barang
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
